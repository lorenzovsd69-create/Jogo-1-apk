<script>
(function() {
    let audioCtx = null;

    // Destravador oficial exigido pelos navegadores
    window.LoviduAudioEngine_Ativar = function() {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            console.log("🎵 [ÁUDIO] Canal de mineração liberado!");
        } catch(e) {
            console.warn("Navegador barrou o áudio:", e);
        }
    };

    // 🔨 SOM DE PEDRA COESA QUEBRANDO (Abafado e Pesado - Sem estalos de fogos)
    function tocarSomPedraQuebrando() {
        if (!audioCtx || audioCtx.state === 'suspended') return;

        const tempoAtual = audioCtx.currentTime;

        // 1. O GOLPE INICIAL (O impacto da ferramenta)
        const oscGolpe = audioCtx.createOscillator();
        const ganhoGolpe = audioCtx.createGain();
        
        oscGolpe.type = 'triangle';
        oscGolpe.frequency.setValueAtTime(90, tempoAtual); // Frequência bem grave de impacto
        oscGolpe.frequency.linearRampToValueAtTime(30, tempoAtual + 0.08);
        
        ganhoGolpe.gain.setValueAtTime(0.5, tempoAtual);
        ganhoGolpe.gain.exponentialRampToValueAtTime(0.001, tempoAtual + 0.1);
        
        oscGolpe.connect(ganhoGolpe);
        ganhoGolpe.connect(audioCtx.destination);

        // 2. O DESMORONAMENTO DA ROCHA (Som opaco de pedra rachando e cedendo)
        const oscRocha = audioCtx.createOscillator();
        const filtroRocha = audioCtx.createBiquadFilter();
        const ganhoRocha = audioCtx.createGain();

        // Onda dente de serra distorce o som para parecer atrito de pedra rachando
        oscRocha.type = 'sawtooth'; 
        oscRocha.frequency.setValueAtTime(60, tempoAtual);
        oscRocha.frequency.linearRampToValueAtTime(20, tempoAtual + 0.35);

        // Filtro passa-baixa ultra agressivo elimina agudos (tira o efeito de fogos de artifício)
        filtroRocha.type = 'lowpass';
        filtroRocha.frequency.setValueAtTime(220, tempoAtual); // Corta tudo acima de 220Hz (som só de terra/pedra pesada)
        filtroRocha.frequency.linearRampToValueAtTime(80, tempoAtual + 0.35);

        // Controla a duração do som da pedra caindo (0.35 segundos)
        ganhoRocha.gain.setValueAtTime(0.25, tempoAtual);
        ganhoRocha.gain.exponentialRampToValueAtTime(0.001, tempoAtual + 0.35);

        oscRocha.connect(filtroRocha);
        filtroRocha.connect(ganhoRocha);
        ganhoRocha.connect(audioCtx.destination);

        // Ativa os geradores de som
        oscGolpe.start(tempoAtual);
        oscGolpe.stop(tempoAtual + 0.1);
        
        oscRocha.start(tempoAtual);
        oscRocha.stop(tempoAtual + 0.35);
    }

    // 🔄 LOOP COM RITMO DE TRABALHO (Pausas curtas e naturais)
    function loopEfeitoSonoroMineracao() {
        const menuInicial = document.getElementById('tela-menu-inicial');
        const loadingScreen = document.getElementById('tela-loading-sistema');

        const jogoEstaAtivo = menuInicial && 
                              (menuInicial.style.display === 'none' || menuInicial.style.opacity === '0') &&
                              (!loadingScreen || loadingScreen.style.display === 'none');

        if (jogoEstaAtivo) {
            tocarSomPedraQuebrando();
        }

        // 👇 RITMO PERFEITO: Dá uma batida e espera entre 1.0 e 2.0 segundos antes da próxima.
        // O som dura 0.35 segundos, então fica um silêncio curto de mais ou menos 1 segundo.
        const proximoGolpe = Math.random() * 1000 + 1000; 
        setTimeout(loopEfeitoSonoroMineracao, proximoGolpe);
    }

    // Monitora a ativação inicial do motor
    setInterval(() => {
        if (audioCtx && audioCtx.state === 'running') {
            loopEfeitoSonoroMineracao();
        }
    }, 1000);

    window.addEventListener('click', window.LoviduAudioEngine_Ativar);
})();
</script>
<script>
(function() {
    let audioCtx = null;

    // Destravador oficial exigido pelos navegadores
    window.LoviduAudioEngine_Ativar = function() {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            console.log("🎵 [ÁUDIO] Canal de raspagem de pedra ativado!");
        } catch(e) {
            console.warn("Navegador barrou o áudio:", e);
        }
    };

    // 🔨 REPRODUÇÃO DO VÍDEO: ROCHA ARRASTANDO E ENCAIXANDO
    function tocarSomPedraArrastando() {
        if (!audioCtx || audioCtx.state === 'suspended') return;

        const tempoAtual = audioCtx.currentTime;
        const duracaoArrasto = 1.2; // Tempo em segundos que a rocha fica deslizando/raspando

        // 1. O SOM DO ARRASTO (Frequência super grave e instável para simular atrito)
        const oscArrasto = audioCtx.createOscillator();
        const filtroArrasto = audioCtx.createBiquadFilter();
        const ganhoArrasto = audioCtx.createGain();

        // Onda dente de serra dá a textura áspera da rocha raspando
        oscArrasto.type = 'sawtooth';
        oscArrasto.frequency.setValueAtTime(45, tempoAtual);
        // Pequena variação para imitar a pedra passando por imperfeições no chão
        oscArrasto.frequency.linearRampToValueAtTime(35, tempoAtual + duracaoArrasto);

        // Filtro passa-baixa corta todo o agudo deixando o som abafado igual ao do vídeo
        filtroArrasto.type = 'lowpass';
        filtroArrasto.frequency.setValueAtTime(140, tempoAtual); 
        filtroArrasto.frequency.linearRampToValueAtTime(90, tempoAtual + duracaoArrasto);

        // Controle de volume do deslizamento
        ganhoArrasto.gain.setValueAtTime(0.001, tempoAtual);
        ganhoArrasto.gain.linearRampToValueAtTime(0.35, tempoAtual + 0.2); // Fade-in rápido do início do movimento
        ganhoArrasto.gain.setValueAtTime(0.35, tempoAtual + duracaoArrasto - 0.1);
        ganhoArrasto.gain.linearRampToValueAtTime(0.001, tempoAtual + duracaoArrasto); // Some quando para

        oscArrasto.connect(filtroArrasto);
        filtroArrasto.connect(ganhoArrasto);
        ganhoArrasto.connect(audioCtx.destination);

        // 2. O IMPACTO FINAL (O baque seco quando a pedra para de correr)
        const tempoImpacto = tempoAtual + duracaoArrasto - 0.15;
        const oscBaque = audioCtx.createOscillator();
        const ganhoBaque = audioCtx.createGain();

        oscBaque.type = 'triangle';
        oscBaque.frequency.setValueAtTime(75, tempoImpacto);
        oscBaque.frequency.linearRampToValueAtTime(20, tempoImpacto + 0.2);

        ganhoBaque.gain.setValueAtTime(0.4, tempoImpacto);
        ganhoBaque.gain.exponentialRampToValueAtTime(0.001, tempoImpacto + 0.2);

        oscBaque.connect(ganhoBaque);
        ganhoBaque.connect(audioCtx.destination);

        // Inicialização dos motores de som
        oscArrasto.start(tempoAtual);
        oscArrasto.stop(tempoAtual + duracaoArrasto);

        oscBaque.start(tempoImpacto);
        oscBaque.stop(tempoImpacto + 0.2);
    }

    // 🔄 LOOP CONTROLADO (Ritmo de trabalho constante com pausas)
    function loopEfeitoSonoroMineracao() {
        const menuInicial = document.getElementById('tela-menu-inicial');
        const loadingScreen = document.getElementById('tela-loading-sistema');

        const jogoEstaAtivo = menuInicial && 
                              (menuInicial.style.display === 'none' || menuInicial.style.opacity === '0') &&
                              (!loadingScreen || loadingScreen.style.display === 'none');

        if (jogoEstaAtivo) {
            tocarSomPedraArrastando();
        }

        // Como o som dura 1.2 segundos, colocamos uma pausa curta de aproximadamente 1 a 1.5 segundos entre um arrasto e outro
        const proximoGolpe = duracaoArrasto * 1000 + (Math.random() * 500 + 1000); 
        setTimeout(loopEfeitoSonoroMineracao, proximoGolpe);
    }

    // Monitora o estado ativo do som
    setInterval(() => {
        if (audioCtx && audioCtx.state === 'running') {
            loopEfeitoSonoroMineracao();
        }
    }, 1000);

    window.addEventListener('click', window.LoviduAudioEngine_Ativar);
})();
</script>

function processarGanhoMineradora(valorGanho) {
    // Aplica o bônus de investimento do mapa atual
    let valorComMultiplicador = valorGanho * multiplicadorMapa;
    dinheiro += valorComMultiplicador;
    faturamentoAcumulado += valorComMultiplicador;

    // Regra: A cada R$ 2.500 faturados brutos pela mineradora (pagando água, luz, funcionários)...
    if (faturamentoAcumulado >= 2500) {
        let blocosDeLucro = Math.floor(faturamentoAcumulado / 2500);
        saldoPessoal += blocosDeLucro * 100; // ...você recebe R$ 100 de Lucro Líquido no seu bolso!
        faturamentoAcumulado %= 2500;       // Sobra o resto para a próxima meta

        console.log(`💼 Despesas Pagas! R$ ${blocosDeLucro * 100} de Lucro adicionado ao seu Saldo Pessoal.`);

}

function viajarParaMineradora(idMapa) {
    const mapa = catalogoMineradoras[idMapa];
    
    // Caso 1: Você já é dono dessa mineradora -> Só viaja para ela

            listaBotoes.forEach(item => { item.elemento.style.background = dinheiro >= item.custo ? '#2ecc71' : '#7f8c8d'; });
        }
        atualizarUI();

        document.getElementById('btn-abrir-mercado').addEventListener('click', () => { atualizarUI(); painelMercado.style.display = 'flex'; });
        document.getElementById('btn-voltar').addEventListener('click', () => { painelMercado.style.display = 'none'; });

        btnUpgradeValor.addEventListener('click', () => {
            if (dinheiro >= precoUpgradeValor) { dinheiro -= precoUpgradeValor; // Substitua o antigo aumento de dinheiro por esta linha:
processarGanhoMineradora(valorPorEsfera);
 precoUpgradeValor = Math.floor(precoUpgradeValor * 1.5);
            // Salva o progresso do jogador a cada 3 segundos automaticamente
setInterval(salvarProgressoDoJogador, 3000);

            atualizarUI(); }
        });
        btnUpgradeAuto.addEventListener('click', () => {
            if (dinheiro >= precoUpgradeAuto) { dinheiro -= precoUpgradeAuto; esferasPorSegundo += 1; precoUpgradeAuto = Math.floor(precoUpgradeAuto * 1.6); atualizarUI(); }
        });
        btnUpgradeTamanho.addEventListener('click', () => {
            if (dinheiro >= precoUpgradeTamanho) { dinheiro -= precoUpgradeTamanho; tamanhoEsfera += 0.3; precoUpgradeTamanho = Math.floor(precoUpgradeTamanho * 1.7); atualizarUI(); }
        });
        btnUpgradeGravidade.addEventListener('click', () => {
            if (dinheiro >= precoUpgradeGravidade) { dinheiro -= precoUpgradeGravidade; nivelGravidade += 3.0; world.gravity.set(0, -nivelGravidade, 0); precoUpgradeGravidade = Math.floor(precoUpgradeGravidade * 1.6); atualizarUI(); }
        });
        btnUpgradeQuique.addEventListener('click', () => {
            if (dinheiro >= precoUpgradeQuique && nivelQuique < 0.85) {
                dinheiro -= precoUpgradeQuique; nivelQuique += 0.08;
                world.removeContactMaterial(contactMaterial);
                contactMaterial = new CANNON.ContactMaterial(groundMaterial, ballMaterial, { friction: nivelAtrito, restitution: nivelQuique });
                world.addContactMaterial(contactMaterial); precoUpgradeQuique = Math.floor(precoUpgradeQuique * 1.6); atualizarUI();
            }
        });
        btnUpgradeAtrito.addEventListener('click', () => {
            if (dinheiro >= precoUpgradeAtrito && nivelAtrito > 0.05) {
                dinheiro -= precoUpgradeAtrito; nivelAtrito -= 0.06;
                world.removeContactMaterial(contactMaterial);
                contactMaterial = new CANNON.ContactMaterial(groundMaterial, ballMaterial, { friction: nivelAtrito, restitution: nivelQuique });
                world.addContactMaterial(contactMaterial); precoUpgradeAtrito = Math.floor(precoUpgradeAtrito * 1.6); atualizarUI();
            }
        });

        setInterval(() => {
            if (esferasPorSegundo > 0) { for (let i = 0; i < esferasPorSegundo; i++) { setTimeout(spawnBall, i * 120); } }
        }, 1000);

        // --- 11. LOOP DE EXECUÇÃO E ANIMAÇÃO HUMANA ANATÔMICA ---
        const timeStep = 1 / 60; let lastTime;

        function animate(time) {
            requestAnimationFrame(animate); updateCameraSmoothly(); 

            // CÁLCULO DE ANIMAÇÃO DA ANATOMIA HUMANA (Sincronizada por Juntas)
            const velocidadeGolpe = time * 0.006;
            trabalhadores.forEach(t => {
                // Onda senoidal para simular a preparação e a batida rígida
                const onda = Math.sin(velocidadeGolpe + t.offset);
                
                // 1. Ombro levanta e abaixa
                t.jOmbroD.rotation.x = -0.5 + onda * 0.9;
                t.jOmbroD.rotation.z = 0.2 + Math.cos(velocidadeGolpe + t.offset) * 0.1;

                // 2. Cotovelo flexiona de forma realista para trazer a picareta para perto
                t.jCotoveloD.rotation.x = -0.4 + (onda > 0 ? onda * 0.5 : 0);

                // 3. Tronco se curva levemente para frente acompanhando a força do golpe
                t.tronco.rotation.x = 0.1 + onda * 0.15;

                // 4. Pernas flexionam levemente para dar estabilidade na base
                t.jPernaE.rotation.x = Math.abs(onda) * 0.1;
                t.jPernaD.rotation.x = -Math.abs(onda) * 0.1;
            });

            if (lastTime !== undefined) {
                world.step(timeStep);
                balls.forEach(obj => {
                    obj.mesh.position.copy(obj.body.position); obj.mesh.quaternion.copy(obj.body.quaternion);
                    
                    // Verificação estrita baseada no raio da esfera para evitar pontuação fantasma
                    const raioAtual = obj.body.shapes[0].radius;
                    if (obj.body.position.y <= (raioAtual + 0.15)) {
                        if (!obj.body.isTouchGround) {
    obj.body.isTouchGround = true; 
    // 👇 CONECTA O SEU BOLSO PESSOAL E ATUALIZA TUDO NA HORA!
    processarGanhoMineradora(valorPorEsfera);
    atualizarUI();
    atualizarPlacarSaldoPessoal();
    atualizarUIIMperio();
}

                    } else if (obj.body.position.y > (raioAtual + 0.6)) {
                        obj.body.isTouchGround = false;
                    }
                });
            }
            lastTime = time; renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });
carregarProgressoDoJogador();
atualizarUI(); // Garante que os textos e preços na tela atualizem com os dados salvos
        // ========================================================
        
        // CONTROLADORES INTERATIVOS DO MENU CORRIGIDOS (FLUXO DIRETO)
        // ========================================================
        const telaMenu = document.getElementById('tela-menu-inicial');
        const janelaCreditos = document.getElementById('janela-creditos');
        const textoMenu = document.getElementById('texto-menu-dinamico');
        
        const btnAbrirOpcoes = document.getElementById('btn-abrir-opcoes');
        const btnContinuar = document.getElementById('btn-continuar');
        const btnReiniciar = document.getElementById('btn-reiniciar');

        // Função para fechar o menu de forma suave e liberar o jogo
        function fecharMenuComEfeito() {
            telaMenu.style.opacity = '0';
            setTimeout(() => { telaMenu.style.display = 'none'; }, 500);
        }

        // Transforma o botão principal nas duas opções (Continuar ou Reiniciar)
        btnAbrirOpcoes.addEventListener('click', () => {
            btnAbrirOpcoes.style.display = 'none';
            textoMenu.innerText = "Escolha como deseja prosseguir com as operações no canyon:";
            btnContinuar.style.display = 'block';
            btnReiniciar.style.display = 'block';
        });

        // 🟢 BOTAO CONTINUAR: Carrega o último save e entra direto
        btnContinuar.addEventListener('click', () => {
          atualizarPlacarSaldoPessoal();

            if (typeof carregarProgressoDoJogador === 'function') {
                carregarProgressoDoJogador();
            }
            if (typeof atualizarUI === 'function') {
                atualizarUI();
            }
            fecharMenuComEfeito();
            // --- FORÇADOR DE RENDERIZAÇÃO E ATIVAÇÃO DO MOTOR GRÁFICO ---
try {
    // 1. Força o renderizador a desenhar o cenário atual na GPU imediatamente
    if (typeof renderer !== 'undefined' && typeof scene !== 'undefined' && typeof camera !== 'undefined') {
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.render(scene, camera);
    }

    // 2. Dispara um evento falso de redimensionamento para recalcular a lente da câmera 3D
    window.dispatchEvent(new Event('resize'));

    // 3. Reativa manualmente o loop de animação caso ele tenha congelado
    if (typeof animate === 'function') {
        requestAnimationFrame(animate);
    }
    
    console.log("🚀 Motor gráfico reativado com sucesso!");
} catch (erroGrafico) {
    console.warn("Aviso ao forçar renderização: ", erroGrafico);
}
// -------------------------------------------------------------

        });

        // 🔴 BOTAO REINICIAR: Apaga tudo, limpa o mapa e entra DIRETO
        btnReiniciar.addEventListener('click', () => {
            const confirmacao = confirm("Atenção Engenheiro! Tem certeza que deseja apagar todo o seu progresso? O jogo reiniciará do zero imediatamente.");
            
            if (confirmacao) {
                // 1. Limpa o LocalStorage do navegador
                try {
                    localStorage.clear();
                } catch(e) { console.log("Erro ao limpar armazenamento."); }

                // 2. Remove TODAS as esferas antigas que estavam rodando na tela e na física
                while(balls.length > 0) {
                    const esfera = balls.pop();
                    scene.remove(esfera.mesh);       // Deleta do visual 3D
                    world.removeBody(esfera.body);   // Deleta do motor físico
                }

                // 3. Reseta os valores numéricos no código para o padrão inicial
                dinheiro = 0; 
                valorPorEsfera = 1; 
                esferasPorSegundo = 0;   
                precoUpgradeValor = 50; 
                precoUpgradeAuto = 50;   
                tamanhoEsfera = 1.2; 
                precoUpgradeTamanho = 150;  
                nivelGravidade = 12.0; 
                precoUpgradeGravidade = 100;
                nivelQuique = 0.25; 
                precoUpgradeQuique = 120;
                nivelAtrito = 0.4; 
                precoUpgradeAtrito = 80;

                // 4. Aplica o reset de gravidade e atrito no motor físico Cannon.js
                if (typeof world !== 'undefined') {
                    world.gravity.set(0, -nivelGravidade, 0);
                    if (typeof contactMaterial !== 'undefined' && typeof groundMaterial !== 'undefined' && typeof ballMaterial !== 'undefined') {
                        world.removeContactMaterial(contactMaterial);
                        contactMaterial = new CANNON.ContactMaterial(groundMaterial, ballMaterial, { friction: nivelAtrito, restitution: nivelQuique });
                        world.addContactMaterial(contactMaterial);
                    }
                }

                // 5. Força a Interface Gráfica (UI) a se atualizar com os valores resetados na hora
                if (typeof atualizarUI === 'function') {
                    atualizarUI();
                }

                // 6. Grava o estado zerado por cima para consolidar o reset na memória
                if (typeof salvarProgressoDoJogador === 'function') {
                    salvarProgressoDoJogador();
                }
                
                // 7. ENTRA DIRETO NO JOGO (Esconde o menu sem precisar clicar em continuar)
                fecharMenuComEfeito();
            }
        });

        // Controle da Janela de Créditos
        document.getElementById('btn-creditos').addEventListener('click', () => {
            janelaCreditos.style.display = 'block';
            setTimeout(() => { janelaCreditos.style.transform = 'translate(-50%, -50%) scale(1)'; }, 10);
        });

        document.getElementById('btn-fechar-creditos').addEventListener('click', () => {
            janelaCreditos.style.transform = 'translate(-50%, -50%) scale(0.9)';
            setTimeout(() => { janelaCreditos.style.display = 'none'; }, 150);
        });

        requestAnimationFrame(animate);
        // ========================================================
// REPOSITÓRIO CENTRAL DE MEMÓRIA (SALVAMENTO AUTOMÁTICO)
// ========================================================

function carregarProgressoDoJogador() {
    try {
        if (!localStorage.getItem('min_dinheiro')) return; // Se não tem jogo salvo, começa do zero

        // 1. Carrega os dados básicos da Mineradora
        dinheiro = parseFloat(localStorage.getItem('min_dinheiro')) || 0;
        valorPorEsfera = parseInt(localStorage.getItem('min_valorPorEsfera')) || 1;      
        esferasPorSegundo = parseInt(localStorage.getItem('min_esferasPorSegundo')) || 0;   
        precoUpgradeValor = parseInt(localStorage.getItem('min_precoUpgradeValor')) || 50;  
        precoUpgradeAuto = parseInt(localStorage.getItem('min_precoUpgradeAuto')) || 50;   
        tamanhoEsfera = parseFloat(localStorage.getItem('min_tamanhoEsfera')) || 1.2;       
        precoUpgradeTamanho = parseInt(localStorage.getItem('min_precoUpgradeTamanho')) || 150;  
        nivelGravidade = parseFloat(localStorage.getItem('min_nivelGravidade')) || 12.0; 
        precoUpgradeGravidade = parseInt(localStorage.getItem('min_precoUpgradeGravidade')) || 100;
        nivelQuique = parseFloat(localStorage.getItem('min_nivelQuique')) || 0.25;
        precoUpgradeQuique = parseInt(localStorage.getItem('min_precoUpgradeQuique')) || 120;
        nivelAtrito = parseFloat(localStorage.getItem('min_nivelAtrito')) || 0.4;
        precoUpgradeAtrito = parseInt(localStorage.getItem('min_precoUpgradeAtrito')) || 80;
      
        // 2. Carrega os dados do Império e Saldo Pessoal
        saldoPessoal = parseFloat(localStorage.getItem('min_saldoPessoal')) || 0;
        faturamentoAcumulado = parseFloat(localStorage.getItem('min_faturamentoAcumulado')) || 0;
        mineradoraAtual = localStorage.getItem('min_mineradoraAtual') || "canyon";
        
        const salvamentoMapas = localStorage.getItem('min_mapasComprados');
        if (salvamentoMapas) {
            mapasComprados = JSON.parse(salvamentoMapas);
        }

        if (catalogoMineradoras[mineradoraAtual]) {
            multiplicadorMapa = catalogoMineradoras[mineradoraAtual].multiplicador;
            // Atualiza visualmente o mapa atual após o carregamento do cenário
            setTimeout(() => { 
                if (typeof viajarParaMineradora === 'function') {
                    viajarParaMineradora(mineradoraAtual); 
                }
            }, 800);
        }

        // 3. Reaplica as configurações de física no motor Cannon.js
        if (typeof world !== 'undefined') {
            world.gravity.set(0, -nivelGravidade, 0);
            if (typeof contactMaterial !== 'undefined' && typeof groundMaterial !== 'undefined' && typeof ballMaterial !== 'undefined') {
                world.removeContactMaterial(contactMaterial);
                contactMaterial = new CANNON.ContactMaterial(groundMaterial, ballMaterial, { friction: nivelAtrito, restitution: nivelQuique });
                world.addContactMaterial(contactMaterial);
            }
        }
        
        // 4. Margem de segurança de 500ms para atualizar o placar sem conflitar com a leitura dos botões do menu
        setTimeout(() => {
            if (typeof atualizarPlacarSaldoPessoal === 'function') {
                atualizarPlacarSaldoPessoal();
            }
        }, 500);

    } catch (e) {
        console.warn("Aba anônima ou restrição do navegador detectada. O jogo vai rodar sem salvar.", e);
    }
}


function salvarProgressoDoJogador() {
    try {
        localStorage.setItem('min_dinheiro', dinheiro);
        localStorage.setItem('min_valorPorEsfera', valorPorEsfera);
        localStorage.setItem('min_esferasPorSegundo', esferasPorSegundo);
        localStorage.setItem('min_precoUpgradeValor', precoUpgradeValor);
        localStorage.setItem('min_precoUpgradeAuto', precoUpgradeAuto);
        localStorage.setItem('min_tamanhoEsfera', tamanhoEsfera);
        localStorage.setItem('min_precoUpgradeTamanho', precoUpgradeTamanho);
        localStorage.setItem('min_nivelGravidade', nivelGravidade);
        localStorage.setItem('min_precoUpgradeGravidade', precoUpgradeGravidade);
        localStorage.setItem('min_nivelQuique', nivelQuique);
        localStorage.setItem('min_precoUpgradeQuique', precoUpgradeQuique);
        localStorage.setItem('min_nivelAtrito', nivelAtrito);
        localStorage.setItem('min_precoUpgradeAtrito', precoUpgradeAtrito);
        
        
        // 👇 NOVAS LINHAS ADICIONADAS PARA O IMPÉRIO
        localStorage.setItem('min_saldoPessoal', saldoPessoal);
        localStorage.setItem('min_faturamentoAcumulado', faturamentoAcumulado);
        localStorage.setItem('min_mineradoraAtual', mineradoraAtual);
        localStorage.setItem('min_mapasComprados', JSON.stringify(mapasComprados));
    } catch (e) {
        // Ignora silenciosamente se o navegador bloquear a gravação
    }
}

// ========================================================
// Exibe o Saldo Pessoal tanto no Menu quanto no Placar Fixo da Tela
function atualizarPlacarSaldoPessoal() {
    // Texto formatado em formato de moeda real (R$ X,XX)
    const textoFormatado = `R$ ${saldoPessoal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
    
    // 1. Atualiza o mostrador dentro do Menu Inicial
    const elSaldoMenu = document.getElementById('menu-saldo-pessoal');
    if (elSaldoMenu) { elSaldoMenu.innerText = textoFormatado; }
    
    // 2. Atualiza o novo mostrador que fica na tela durante o jogo!
    const elSaldoDireto = document.getElementById('contador-saldo-direto');
    if (elSaldoDireto) { elSaldoDireto.innerText = textoFormatado; }
}
